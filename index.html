  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0f0a1a 0%, #1a0f2e 40%, #0f1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px 40px;
      color: #e8e0f0;
    }

    /* ── Two-column profile section ── */
    .profiles {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 200px;
      max-width: 300px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid rgba(180, 140, 255, 0.4);
      box-shadow: 0 0 30px rgba(140, 100, 255, 0.2);
      object-fit: cover;
      margin-bottom: 12px;
    }

    .avatar-xun {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid rgba(255, 140, 180, 0.4);
      box-shadow: 0 0 30px rgba(255, 100, 150, 0.2);
      object-fit: cover;
      margin-bottom: 12px;
    }

    .profile h2 {
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
    }

    .profile .bio {
      font-size: 13px;
      color: #b8a8d0;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .profile .bio-xun {
      font-size: 13px;
      color: #d0b8c8;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .profile .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 16px;
      text-decoration: none;
      color: #e8e0f0;
      transition: all 0.25s ease;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(180, 140, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(140, 100, 255, 0.15);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
    }

    .link-text .label {
      font-size: 14px;
      font-weight: 500;
    }

    .link-text .url {
      font-size: 11px;
      color: #9080a8;
      margin-top: 1px;
    }

    .icon-bluesky { background: rgba(30, 130, 255, 0.2); }
    .icon-youtube { background: rgba(255, 50, 50, 0.2); }
    .icon-instagram { background: linear-gradient(135deg, rgba(255, 200, 0, 0.2), rgba(255, 50, 120, 0.2)); }
    .icon-threads { background: rgba(0, 0, 0, 0.2); }
    .icon-heart { background: rgba(255, 100, 150, 0.2); }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #605070;
      text-align: center;
    }

    .footer a {
      color: #8070a0;
      text-decoration: none;
    }

    .footer a:hover {
      color: #b8a8d0;
    }

    @media (max-width: 560px) {
      .profiles { gap: 30px; }
      .profile { max-width: 100%; }
    }
  </style>
</head>
