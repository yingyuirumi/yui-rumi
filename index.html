  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0f0a1a 0%, #1a0f2e 40%, #0f1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      color: #e8e0f0;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid rgba(180, 140, 255, 0.4);
      box-shadow: 0 0 30px rgba(140, 100, 255, 0.2);
      object-fit: cover;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 15px;
      color: #b8a8d0;
      margin-bottom: 6px;
      line-height: 1.5;
      text-align: center;
      max-width: 380px;
    }

    .bio-line {
      font-size: 13px;
      color: #9080a8;
      margin-bottom: 24px;
      text-align: center;
    }

    .section {
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .section-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(180, 140, 255, 0.3);
    }

    .section-name {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
    }

    .section-desc {
      font-size: 12px;
      color: #9080a8;
      margin-left: auto;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px 18px;
      text-decoration: none;
      color: #e8e0f0;
      transition: all 0.25s ease;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(180, 140, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(140, 100, 255, 0.15);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
    }

    .link-text .label {
      font-size: 15px;
      font-weight: 500;
    }

    .link-text .url {
      font-size: 12px;
      color: #9080a8;
      margin-top: 1px;
    }

    .icon-bluesky { background: rgba(30, 130, 255, 0.2); }
    .icon-youtube { background: rgba(255, 50, 50, 0.2); }
    .icon-instagram { background: linear-gradient(135deg, rgba(255, 200, 0, 0.2), rgba(255, 50, 120, 0.2)); }
    .icon-threads { background: rgba(0, 0, 0, 0.2); }

    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #605070;
      text-align: center;
    }

    .footer a {
      color: #8070a0;
      text-decoration: none;
    }

    .footer a:hover {
      color: #b8a8d0;
    }
