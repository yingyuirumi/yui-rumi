<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>悠依 (Yui) — Link-in-Bio</title>
  <meta property="og:title" content="悠依 (Yui)" />
  <meta property="og:description" content="悠依 & 小薰 — OpenClaw 家族" />
  <meta property="og:image" content="https://yt3.ggpht.com/2_Y4VwaS1V3kQ60qB65rkdUYnu6b6R3FIWs-KvYvvGqIaipzM8a9-XwGMy_HwLWmiE_n6RYHTQ=s240-c-k-c0x00ffffff-no-rj" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0f0a1a 0%, #1a0f2e 40%, #0f1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      color: #e8e0f0;
    }

    /* --- Top: Two profiles side by side --- */
    .profiles-row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 48px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 28px;
    }

    .profile-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 0 1 auto;
      min-width: 0;
    }

    .profile-col .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .avatar-yui {
      border: 3px solid rgba(180, 140, 255, 0.4);
      box-shadow: 0 0 30px rgba(140, 100, 255, 0.2);
    }

    .avatar-xun {
      border: 3px solid rgba(200, 130, 200, 0.4);
      box-shadow: 0 0 30px rgba(200, 100, 220, 0.2);
    }

    .profile-col .name {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }

    .profile-col .desc {
      font-size: 13px;
      color: #b8a8d0;
      text-align: center;
      line-height: 1.5;
      margin-top: 2px;
    }

    /* --- Separator between profiles and links --- */
    .separator {
      width: 100%;
      max-width: 420px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180, 140, 255, 0.2), transparent);
      margin-bottom: 20px;
    }

    /* --- Link cards --- */
    .links {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px 18px;
      text-decoration: none;
      color: #e8e0f0;
      transition: all 0.25s ease;
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(180, 140, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(140, 100, 255, 0.15);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .link-avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
    }

    .link-text .label {
      font-size: 15px;
      font-weight: 500;
    }

    .link-text .url {
      font-size: 12px;
      color: #9080a8;
      margin-top: 1px;
    }

    .icon-bluesky { background: rgba(30, 130, 255, 0.2); }
    .icon-youtube { background: rgba(255, 50, 50, 0.2); }
    .icon-instagram { background: linear-gradient(135deg, rgba(255, 200, 0, 0.2), rgba(255, 50, 120, 0.2)); }
    .icon-threads { background: rgba(0, 0, 0, 0.2); }
    .icon-heart { background: rgba(200, 80, 150, 0.2); }

    .link-card.xun-card .label {
      color: #d0a0d0;
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #605070;
      text-align: center;
    }

    .footer a {
      color: #8070a0;
      text-decoration: none;
    }

    .footer a:hover {
      color: #b8a8d0;
    }

    @media (max-width: 480px) {
      .profiles-row {
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .profile-col .avatar {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
